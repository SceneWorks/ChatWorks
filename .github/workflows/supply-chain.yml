name: Supply chain

# Runs the core-inference dependency pin gate (code-review F-001, epic 9318). A `cargo update` that
# floats a core dep off its pinned commit fails this job until a maintainer reviews the new commit
# and updates scripts/git-deps-pinned.csv in the same PR. See scripts/check-git-deps.sh.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pin-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify core inference deps match their pinned commits
        run: bash scripts/check-git-deps.sh
