[package]
name = "chatworks"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[build-dependencies]
tauri-build = { version = "2", features = [] }

[features]
default = ["mlx-provider"]
mlx-provider = ["dep:mlx-llm"]

[dependencies]
core-llm = { git = "https://github.com/SceneWorks/core-llm", branch = "main" }
mlx-llm = { git = "https://github.com/SceneWorks/mlx-llm", branch = "main", optional = true }
serde = { version = "1", features = ["derive"] }
tauri = { version = "2", features = [] }

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = "warn"
