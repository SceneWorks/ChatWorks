[package]
name = "chatworks"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[build-dependencies]
tauri-build = { version = "2", features = [] }

# The inference backend is chosen per-platform via the target-specific dependencies below
# (Apple MLX on macOS, cross-platform Candle on Windows/Linux), so a plain `cargo build` /
# `tauri build` needs no extra features. To run the Candle backend on an NVIDIA GPU, build
# candle-llm with its `cuda` feature: add `features = ["cuda"]` to the candle-llm dependency
# below (this requires the CUDA toolkit). macOS uses MLX (Apple Metal) automatically.

[dependencies]
axum = "0.8"
base64 = "0.22"
# Pinned to the same rev the backend deps pin (mlx-llm + candle-llm hard-pin core-llm by `rev`), so
# cargo unifies on ONE core-llm source — otherwise a `branch = "main"` spec here and the `rev` spec
# there are distinct git sources, yielding two core-llm copies whose link-time provider registries
# don't share (the backend's `candle-llama`/`mlx-llama` registration would be invisible to this crate).
# `6e07ae4` (sc-8533) is additive over `3870ed1` (Qwen3-VL: `Content::Video`, `supports_video`,
# `weightless_vision`): it adds the OPTIONAL `LoadSpec.kv_cache_quant` + `supports_kv_cache_quant`
# capability the KV-cache-quant UI threads through (epic sc-8528). NOTE: the macOS `mlx-llm` dep is
# already on this rev; candle-llm (Windows/Linux) keeps building unchanged — the new field is Optional,
# so candle reports the capability as unsupported.
core-llm = { git = "https://github.com/SceneWorks/core-llm", rev = "6e07ae4" }
futures-util = "0.3"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
keyring = { version = "3", features = ["apple-native", "windows-native", "sync-secret-service"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["net", "rt-multi-thread", "sync"] }
tokio-stream = "0.1"

[dev-dependencies]
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }

# Inference backend — exactly one is compiled per platform.
# macOS (Apple Silicon): the MLX backend.
# Temporarily on the sc-8533 branch (not `main`) so the macOS build unifies core-llm on `6e07ae4`:
# mlx-llm `main` still pins core-llm `3870ed1`, which lacks the OPTIONAL `kv_cache_quant` field, and a
# mismatched core-llm rev would split the link-time provider registry. Revert to `branch = "main"`
# once the sc-8533 mlx-llm PR (#62) merges and `main` carries the `6e07ae4` core-llm pin.
[target.'cfg(target_os = "macos")'.dependencies]
mlx-llm = { git = "https://github.com/SceneWorks/mlx-llm", branch = "michaeltrefry1818/sc-8533/e-chatworks-kv-cache-qua" }

# Windows / Linux: the cross-platform Candle backend (CPU by default; CUDA via its `cuda` feature).
[target.'cfg(not(target_os = "macos"))'.dependencies]
candle-llm = { git = "https://github.com/SceneWorks/candle-llm", branch = "main" }

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = "warn"
